<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrowthVault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="gv-popup">
    <header>
      <strong data-i18n="appName">GrowthVault</strong>
      <a href="../library/library.html" target="_blank" data-i18n="navLibrary">Library</a>
    </header>

    <p id="page-title">Loading page...</p>

    <label>
      <span data-i18n="popupLabelProject">Project</span>
      <select id="project-select"></select>
    </label>

    <div class="inline-create">
      <input id="new-project-name" type="text" placeholder="New project" data-i18n="popupPlaceholderNewProject">
      <button id="create-project-btn" type="button" data-i18n="popupBtnCreate">Create</button>
    </div>

    <label>
      <span data-i18n="popupLabelType">Type</span>
      <select id="type-select"></select>
    </label>

    <label>
      <span data-i18n="popupLabelNote">Note</span>
      <textarea id="clip-note" placeholder="Optional note" data-i18n="popupLabelNote"></textarea>
    </label>

    <p id="status" role="status"></p>
    <button id="save-page-btn" type="button" data-i18n="popupBtnSavePage">Save current page</button>
  </main>

  <script src="../shared/constants.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
