<!DOCTYPE html>
<html><head><style>
* { margin: 0; padding: 0; }
body { width: 128px; height: 128px; overflow: hidden; }
.icon {
  width: 128px; height: 128px;
  background: linear-gradient(135deg, #4ecca3 0%, #2ecc71 50%, #27ae60 100%);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: 0 4px 12px rgba(78,204,163,0.4);
}
.icon::before {
  content: '';
  position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 18px;
}
.letter {
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 72px; font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  line-height: 1;
  margin-top: -4px;
}
</style></head>
<body>
<div class="icon"><span class="letter">S</span></div>
</body></html>
